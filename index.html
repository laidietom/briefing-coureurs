 current:'home',
 init(){this.renderNav(); this.go('home');},
 toggle(){ $('side').classList.toggle('open'); $('menubtn').textContent = $('side').classList.contains('open') ? 'Fermer' : 'Menu';},
 close(){ if(innerWidth<900 && $('side').classList.contains('open')) this.toggle();},
 renderNav(){ $('nav').innerHTML = pages.map(p=>`<button class="navbtn" id="nav-${p[0]}" onclick="app.go('${p[0]}')"><span class="dot" style="background:${p[2]}"></span>${p[1]}</button>`).join('');},
 go(page){ this.current=page; this.close(); document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active')); const n=$('nav-'+page); if(n)n.classList.add('active'); $('view').innerHTML=this[page](); document.querySelector('.main').scrollTop=0; if(page==='gpx') this.activateGpx();},
 activateGpx(){document.querySelectorAll('[data-gpx-link]').forEach(async a=>{const label=a.dataset.label; const url=a.getAttribute('href'); try{const res=await fetch(url,{method:'HEAD',cache:'no-store'}); if(res.ok){a.classList.remove('disabled'); a.textContent='Télécharger la trace GPX '+label; a.setAttribute('aria-disabled','false');}else{a.classList.add('disabled'); a.textContent='Trace GPX '+label+' disponible le 15 juin'; a.setAttribute('aria-disabled','true');}}catch(e){a.classList.add('disabled'); a.textContent='Trace GPX '+label+' disponible le 15 juin'; a.setAttribute('aria-disabled','true');}});},
 home(){return `<section class="hero"><div><h1 class="mono">Briefing<br><span style="color:var(--orange)">coureurs</span></h1><span class="tag">Ardennes Mega Trail 2026</span><p class="sub" style="max-width:620px;margin:18px auto 0">Toutes les infos essentielles pour les coureurs : horaires, profils, matériel, ravitaillements, barrières, sécurité, accès et stationnement.</p><div class="herogrid">${pages.filter(p=>p[0] !== 'home').map((p,i)=>`<button class="cta ${i===0?'primary':''}" onclick="app.go('${p[0]}')">${p[1]}</button>`).join('')}</div></div></section><div class="card" style="--accent:var(--yellow);margin-top:16px"><h2 class="section-title mono">À retenir</h2><div class="grid two-desktop"><div class="notice">Tous les départs adultes partent de la base sportive de Newet / Village AMT, sauf le départ du Supr’AMT qui se fait après transfert en bus au Fort de Charlemont.</div><div class="notice danger">Aucun gobelet n’est fourni : le gobelet personnel est obligatoire sur toutes les courses.</div></div></div>`},
 supramt(){return `<div class="card" style="--accent:var(--supr)"><h2 class="section-title mono">Briefing officiel coureurs — Supr’AMT</h2><p class="sub"><b>Le 100 Miles de l’Ardennes Méga Trail</b></p><div class="notice"><b>Bienvenue dans l’aventure.</b><br>Chères Supr’A Traileuses, chers Supr’A Traileurs, bienvenue sur la première édition du Supr’AMT, le 100 Miles de l’Ardennes Méga Trail. Si vous êtes ici aujourd’hui, c’est que le Conseil des Sages a retenu votre candidature. Il croit en votre préparation, votre expérience et votre capacité à relever ce défi hors norme.</div><p class="sub">Le Supr’AMT n’est pas une simple course : c’est une traversée, une aventure, une épreuve d’autonomie et un défi de lucidité. Pendant près de 160 kilomètres et 7 000 mètres de dénivelé positif, vous devrez faire preuve autant d’intelligence de course que de résistance physique.</p><div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Partie</th><th>Distance</th><th>Balisage</th><th>Chronométrage</th></tr></thead><tbody><tr><td>Partie 1 — Supr’AMT</td><td>76 km</td><td>Non</td><td>Non</td></tr><tr><td>Partie 2 — AMT</td><td>90 km</td><td>Oui</td><td>Oui</td></tr></tbody></table></div><div class="notice danger" style="margin-top:12px"><b>Votre mission :</b> rejoindre la Base de Newet avant la barrière horaire, gérer intelligemment votre récupération, prendre le départ de l’AMT, puis aller chercher votre statut de Finisher du Supr’AMT.</div></div><div class="card" style="--accent:var(--orange)"><h2 class="section-title mono">Jeudi 18 juin — timing officiel</h2><div class="table-wrap"><table><thead><tr><th>Horaire</th><th>Action</th></tr></thead><tbody><tr><td class="time">17h00</td><td>Ouverture du parking Supr’AMT</td></tr><tr><td class="time">17h00 – 18h00</td><td>Navettes vers la Base de Newet</td></tr><tr><td class="time">18h00</td><td>Ouverture de l’accueil Supr’AMT</td></tr><tr><td class="time">18h00 – 18h45</td><td>Retrait des dossards, sacs et contrôles</td></tr><tr><td class="time">19h00</td><td>Départ du bus vers Charlemont</td></tr><tr><td class="time">20h00</td><td>Arrivée au Fort de Charlemont</td></tr><tr><td class="time">20h00 – 23h30</td><td>Installation, préparation et repos</td></tr><tr><td class="time">23h30</td><td>Départ du Supr’AMT</td></tr></tbody></table></div><div class="grid two-desktop" style="margin-top:12px"><div class="notice"><b>Rendez-vous participants :</b><br>Parking Supr’AMT — Rue de Linchamps, Les Hautes-Rivières. L’équipe de Nicolas vous accueillera entre 17h00 et 18h00. Des navettes assureront en continu votre transfert vers la Base de Newet. Temps de trajet : environ 5 minutes.</div><div class="notice danger"><b>À respecter impérativement :</b><br>Tous les participants doivent être présents sur la base avant 18h45. Le départ du bus est fixé à 19h00 précises. Aucun participant n’est autorisé à rejoindre le Fort de Charlemont par ses propres moyens.</div></div></div><div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Accueil, kit & bracelets</h2><div class="grid two-desktop"><div class="course-card" style="--accent:var(--yellow)"><h3>À l’arrivée sur la Base de Newet</h3><p class="sub">Vous effectuerez : retrait du dossard, remise du kit Supr’AMT, remise des bracelets, dépôt des sacs, contrôle du matériel obligatoire et dernières vérifications administratives.</p></div><div class="course-card" style="--accent:var(--yellow)"><h3>Kit Supr’AMT</h3><div class="chips"><span class="chip req">Dossard</span><span class="chip req">Balise GPS</span><span class="chip req">Carnet de route</span><span class="chip req">Bracelet Supr’AMT</span><span class="chip req">Bracelets sacs</span><span class="chip rec">Lot participant</span></div></div><div class="course-card" style="--accent:var(--orange)"><h3>Bracelet officiel Supr’AMT</h3><p class="sub">Ce bracelet tissu vous identifie comme participant au Supr’AMT. Il garantit votre participation, l’accès à l’espace réservé Supr’AMT à Newet et l’accès « all inclusive » à la restauration durant la transition entre les deux parties. Il doit être conservé pendant toute la durée de l’épreuve.</p></div><div class="course-card" style="--accent:var(--amt)"><h3>Suivi balise</h3><p class="sub">La balise GPS doit être portée pendant toute l’épreuve. Le lien de suivi sera communiqué dans la partie Traces GPX.</p></div></div></div><div class="card" style="--accent:var(--amt)"><h2 class="section-title mono">Gestion des sacs</h2><div class="table-wrap"><table><thead><tr><th>Bracelet</th><th>Couleur</th><th>Destination</th></tr></thead><tbody><tr><td>Sac principal Newet</td><td>Rouge</td><td>Base de Newet</td></tr><tr><td>Sac d’allègement AMT</td><td>Blanc</td><td>La Petite Commune</td></tr><tr><td>Sac Base de Vie Vireux</td><td>Rose</td><td>Vireux-Molhain</td></tr><tr><td>Sac Base de Vie Haybes</td><td>Orange</td><td>Haybes</td></tr><tr><td>Sac Base de Vie La Neuville</td><td>Gris</td><td>La Neuville-aux-Haies</td></tr></tbody></table></div><div class="grid two-desktop" style="margin-top:12px"><div class="notice"><b>Sac principal Newet :</b> déposé lors du retrait du dossard, retrouvé à votre arrivée à Newet après la Partie 1. Utilisation recommandée : tenue complète de rechange, alimentation personnelle, récupération, pharmacie, matériel de nuit et vêtements chauds.</div><div class="notice"><b>Sac Base de Vie Partie 1 :</b> vous recevrez trois bracelets — rose Vireux-Molhain km 19, orange Haybes km 35, gris La Neuville-aux-Haies km 58. Vous ne pouvez utiliser qu’un seul de ces trois bracelets. Le sac sera acheminé vers la base choisie puis rapatrié vers Newet.</div><div class="notice"><b>Sac d’allègement AMT :</b> acheminé à La Petite Commune puis rapatrié vers Newet à la fermeture du poste.</div><div class="notice danger"><b>Rappel :</b> aucun bâton ne doit être déposé dans les sacs.</div></div></div><div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Matériel obligatoire & autonomie</h2><div class="grid two-desktop"><div class="matblock" style="--accent:var(--yellow)"><h3>Avant la montée dans le bus</h3><div class="chips"><span class="chip req">Trace GPX installée</span><span class="chip req">GPS chargé</span><span class="chip req">Téléphone chargé et allumé</span><span class="chip req">Numéro d’urgence enregistré</span><span class="chip req">Appels possibles depuis la France</span><span class="chip req">Balise GPS portée</span><span class="chip req">Couverture de survie</span><span class="chip req">Sifflet</span><span class="chip req">Frontale principale</span><span class="chip req">Batterie ou frontale de secours</span><span class="chip req">Gobelet personnel</span></div></div><div class="matblock" style="--accent:var(--orange)"><h3>Recommandations minimales</h3><div class="chips"><span class="chip rec">1,5 litre d’eau</span><span class="chip rec">Réserve alimentaire suffisante</span><span class="chip rec">Équipement chaud</span><span class="chip rec">Équipement imperméable</span></div><p class="sub">Vous devez être capables d’affronter la nuit, le froid, le vent, la pluie, une dégradation météo et une attente prolongée en cas d’incident. Sur le Supr’AMT, l’autonomie n’est pas une option : c’est une condition de réussite.</p></div></div></div><div class="card" style="--accent:var(--supr)"><h2 class="section-title mono">Fort de Charlemont & départ</h2><div class="grid two-desktop"><div class="notice"><b>Fort de Charlemont — Givet :</b> arrivée estimée à 20h00. Marion et son équipe vous accueilleront avec une collation. Les accompagnateurs ne sont pas autorisés dans le bus ni sur le site du Fort de Charlemont.</div><div class="notice danger"><b>Départ du Supr’AMT :</b> jeudi à 23h30 depuis le Fort de Charlemont. Pas de balisage, pas de chronométrage : uniquement votre expérience, votre navigation et votre capacité à gérer l’effort. Après le départ, vous devez obligatoirement rejoindre le premier ravitaillement de Vireux-Molhain. Il n’est pas autorisé de rester sur le Fort de Charlemont après le lancement de la course.</div></div></div><div class="card" style="--accent:var(--lst)"><h2 class="section-title mono">Partie 1 — Le Supr’AMT</h2><div class="metric"><div><span class="sub">Distance</span><b>76 km</b></div><div><span class="sub">Dénivelé positif</span><b>1 752 m</b></div></div><div class="grid two-desktop"><div class="notice"><b>Particularités :</b> aucun balisage, aucun chronométrage, navigation GPS obligatoire, progression libre.</div><div class="notice danger"><b>Sécurité routière :</b> le Code de la Route s’applique intégralement. Utilisez les trottoirs lorsqu’ils existent, traversez avec prudence, respectez la signalisation et restez vigilants. Aucune traversée ne sera sécurisée par des bénévoles.</div></div><h3 class="mono" style="margin:18px 0 8px">Ravitaillements Partie 1</h3><div class="table-wrap"><table><thead><tr><th>Lieu</th><th>Km</th><th>D+</th><th>Type</th></tr></thead><tbody><tr><td>Fort de Charlemont</td><td>0</td><td>0</td><td>Départ</td></tr><tr><td>Vireux-Molhain</td><td>19</td><td>382</td><td>Complet</td></tr><tr><td>Haybes</td><td>35</td><td>771</td><td>Complet</td></tr><tr><td>Les Hauts-Buttés</td><td>51</td><td>1 288</td><td>Liquide</td></tr><tr><td>La Neuville-aux-Haies</td><td>58</td><td>1 373</td><td>Complet</td></tr><tr><td>Gorge Saint-Jean</td><td>65</td><td>1 524</td><td>Liquide</td></tr><tr><td>Les Hautes-Rivières</td><td>76</td><td>1 752</td><td>Complet</td></tr></tbody></table></div><div class="notice" style="margin-top:12px"><b>Rappel :</b> 3 ravitaillements complets et 2 ravitaillements liquides sur la Partie 1.</div></div><div class="card" style="--accent:var(--orange)"><h2 class="section-title mono">Assistance & barrière horaire</h2><div class="grid two-desktop"><div class="notice"><b>Assistance autorisée :</b> uniquement sur les zones de ravitaillement : Vireux-Molhain, Haybes, Les Hauts-Buttés, La Neuville-aux-Haies, Gorge Saint-Jean et La Petite Commune sur l’AMT.</div><div class="notice danger"><b>Assistance interdite :</b> en dehors des ravitaillements, dépôts sauvages, véhicule suiveur, accompagnateur, pacer, vélo, moto ou animal.</div><div class="notice danger"><b>Barrière horaire :</b> Base de Newet — vendredi 23h30. Tout participant arrivant après cet horaire sera mis hors course.</div><div class="notice"><b>Base de Newet :</b> restauration all inclusive, espace repos, douches, espace change, soins, massages et espace réservé Supr’AMT.</div></div><div class="notice danger" style="margin-top:12px"><b>Règle fondamentale :</b> vous ne pouvez pas quitter l’enceinte de Newet. Sont autorisés : restauration, repos, bords de Semoy et espace événementiel. Sont interdits : retour à domicile, sortie extérieure et récupération hors site. Cette règle garantit l’équité entre tous les participants.</div></div><div class="card" style="--accent:var(--amt)"><h2 class="section-title mono">Passage sur l’AMT & classement</h2><div class="grid two-desktop"><div class="notice"><b>Tee-shirt officiel Supr’AMT :</b> à votre arrivée à Newet, l’équipe d’Isa vous remettra le tee-shirt officiel Supr’AMT Édition Limitée. Port obligatoire au départ de l’AMT et à l’arrivée du Supr’AMT.</div><div class="notice"><b>Protocole :</b> 10 minutes avant le départ de l’AMT, Marion et son équipe organiseront un protocole spécifique réservé aux participants du Supr’AMT. Votre présence est obligatoire.</div><div class="notice danger"><b>Départ de l’AMT :</b> samedi à 00h01, Base de Newet. C’est à cet instant que débute la partie compétitive du Supr’AMT.</div><div class="notice"><b>Classement Supr’AMT :</b> la Partie 1 n’est pas chronométrée. Elle sert uniquement à qualifier votre départ sur l’AMT. Le classement officiel du Supr’AMT sera établi exclusivement sur le temps réalisé sur l’AMT.</div></div><div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Coureur</th><th>Partie 1</th><th>Partie 2</th></tr></thead><tbody><tr><td>A</td><td>23h59</td><td>10h01</td></tr><tr><td>B</td><td>13h00</td><td>10h02</td></tr></tbody></table></div><p class="sub">Dans cet exemple, le coureur A sera classé devant le coureur B. Le Supr’AMT récompense la meilleure performance sur l’AMT après avoir réalisé la traversée préalable.</p></div><div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Podiums, abandon & esprit Supr’AMT</h2><div class="grid two-desktop"><div class="notice"><b>Podiums :</b> à partir de 14h30 ou dès l’arrivée des 3 premiers hommes et des 3 premières femmes.</div><div class="notice"><b>Double classement :</b> tous les participants du Supr’AMT figureront également dans le classement officiel de l’AMT, épreuve reconnue FFA, UTMB Index et référencée ITRA.</div><div class="notice danger"><b>Abandon :</b> procédure identique à celle de l’AMT. Appeler le numéro abandon, informer l’organisation, restituer le dossard et la balise GPS. Un abandon n’est jamais validé tant que la balise GPS n’a pas été restituée. Dans la mesure du possible, privilégiez toujours un abandon depuis un poste de ravitaillement.</div><div class="notice"><b>Esprit Supr’AMT :</b> si vous rencontrez un participant en difficulté, vous devez lui porter assistance. Parce que c’est le règlement, mais surtout parce que c’est l’esprit du trail.</div></div><div class="notice" style="margin-top:12px"><b>Le mot de la fin :</b> soyez prudents, solidaires et patients. Mangez avant d’avoir faim, buvez avant d’avoir soif, couvrez-vous avant d’avoir froid, ralentissez avant d’exploser et gardez toujours une marge de sécurité. Merci d’être là pour écrire la première page de l’histoire du Supr’AMT. Prenez soin de vous, prenez soin des autres, et rendez-vous à l’arrivée.</div><p class="sub" style="margin-top:12px"><b>Le Conseil des Sages, l’équipe d’organisation, les bénévoles et les partenaires du Supr’AMT.</b></p></div>`},
 courses(){return `<div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Courses & profils</h2><p class="sub">Code couleur repris des profils : Supr’AMT gris, AMT rouge, RLT jaune, LST vert, CDS bleu.</p></div>${DATA.map(c=>`<article class="card" style="--accent:${c.color}"><div class="course-layout"><div><span class="pill" style="background:${c.color};color:#080620">${c.short}</span><h2 class="section-title mono">${c.name}</h2><p class="sub"><b>${c.date}</b> — Départ : <b style="color:${c.color}">${c.start}</b></p><div class="metric"><div><span class="sub">Distance</span><b>${c.distance}</b></div><div><span class="sub">Dénivelé</span><b>${c.dplus}</b></div></div><div class="notice"><b>Ravitos :</b> ${c.ravito}</div><ul class="sub">${c.notes.map(n=>`<li>• ${n}</li>`).join('')}</ul></div><img class="profile" src="${c.profile}" alt="Profil ${c.name}"></div></article>`).join('')}`},
 programme(){return `<div class="card" style="--accent:var(--orange)"><h2 class="section-title mono">Programme départs</h2><div class="grid two-desktop"><div class="course-card" style="--accent:var(--supr)"><h3>Jeudi 18 juin</h3><div class="row"><span>Supr’AMT — Accueil Base Newet</span><b>18h00</b></div><div class="row"><span>Supr’AMT — Départ bus</span><b>19h00</b></div><div class="row"><span>Supr’AMT — Départ</span><b>23h30</b></div></div><div class="course-card" style="--accent:var(--lst)"><h3>Vendredi 19 juin</h3><div class="row"><span>LST</span><b>18h00</b></div><div class="row"><span>L’Enfer des Kids</span><b>19h30</b></div><div class="row"><span>Podium Kids</span><b>20h30</b></div><div class="row"><span>Podium LST</span><b>22h00</b></div></div><div class="course-card" style="--accent:var(--amt)"><h3>Samedi 20 juin</h3><div class="row"><span>AMT</span><b>00h01</b></div><div class="row"><span>RLT</span><b>05h00</b></div><div class="row"><span>Le P’tit Newet</span><b>10h00</b></div><div class="row"><span>Ronde des Hatrelles</span><b>10h15</b></div><div class="row"><span>CDS</span><b>17h00</b></div></div><div class="course-card" style="--accent:var(--yellow)"><h3>Podiums samedi</h3><div class="row"><span>RLT</span><b>13h30</b></div><div class="row"><span>AMT</span><b>14h00</b></div><div class="row"><span>Supr’AMT</span><b>14h30</b></div><div class="row"><span>CDS</span><b>20h00</b></div></div></div></div>`},
 dossards(){return `<div class="card" style="--accent:var(--cds)"><h2 class="section-title mono">Retrait des dossards</h2><div class="grid two-desktop"><div class="course-card" style="--accent:var(--cds)"><h3>Decathlon Charleville-Mézières</h3><p class="sub">55 Route de Prix, 08000 Charleville-Mézières</p><div class="row"><span>Samedi 13 juin</span><b>09h30–19h00</b></div><div class="row"><span>Lundi 15 juin</span><b>11h–14h / 16h30–19h00</b></div><div class="row"><span>Mardi 16 juin</span><b>11h–14h / 16h30–19h00</b></div><div class="row"><span>Mercredi 17 juin</span><b>11h–19h00</b></div><div class="row"><span>Jeudi 18 juin</span><b>11h–14h</b></div></div><div class="course-card" style="--accent:var(--orange)"><h3>Village AMT — Base de Newet</h3><p class="sub">Les Hautes-Rivières (08800)</p><div class="row"><span>Jeudi 18 juin — Supr’AMT uniquement</span><b>18h–20h</b></div><div class="row"><span>Vendredi 19 juin</span><b>16h–22h</b></div><div class="row"><span>Samedi 20 juin</span><b>15h–16h45</b></div><div class="notice danger">Pièce d’identité + téléphone portable obligatoires. Retrait par tiers autorisé avec pièce d’identité du coureur + vérification téléphone.</div></div></div></div>`},
 barrieres(){const courses=[
 {name:'Supr’AMT — 100 Miles',short:'Supr’AMT',color:'var(--supr)',date:'Jeudi 18 / Samedi 20 juin',rows:[['Vireux-Molhain','18','03h00','orange','Entrée du ravitaillement'],['Les Hautes-Rivières / Newet','75','23h30','orange','Entrée du ravitaillement']]},

];return `<div class="card" style="--accent:var(--amt)"><h2 class="section-title mono">Barrières horaires obligatoires</h2><p class="sub">Seules les barrières horaires obligatoires indiquées en rouge et en orange dans le tableau officiel sont reprises ci-dessous.</p><div class="notice" style="margin-top:12px"><b>Règle rouge :</b> barrière horaire à la sortie de l’aire de ravitaillement, synonyme d’arrêt de la course pour le coureur hors délai.</div><div class="notice" style="margin-top:10px;background:rgba(255,107,53,.14);border-color:rgba(255,107,53,.45)"><b>Règle orange :</b> barrière horaire à l’entrée de l’aire de ravitaillement, synonyme d’arrêt de la course pour le coureur hors délai.</div><div class="notice" style="margin-top:10px"><b>Lecture :</b> chaque bloc reprend la couleur officielle de sa course pour éviter toute confusion.</div></div><div class="barrier-grid">${courses.map(c=>`<section class="barrier-card" style="--accent:${c.color}"><div class="barrier-head"><h3 class="mono">${c.name}</h3><span class="barrier-meta">${c.date}</span></div><div class="table-wrap"><table><thead><tr><th>Point concerné</th><th>Km</th><th>Heure limite</th><th>Application</th></tr></thead><tbody>${c.rows.map(r=>`<tr style="${r[3]==='orange'?'background:rgba(255,107,53,.16)':'background:rgba(255,49,49,.12)'}"><td>${r[0]}</td><td>${r[1]}</td><td class="time">${r[2]}</td><td><span class="pill" style="background:${r[3]==='orange'?'var(--orange)':'var(--amt)'};color:white">${r[4]}</span></td></tr>`).join('')}</tbody></table></div></section>`).join('')}</div><div class="card danger" style="--accent:var(--amt);margin-top:16px"><h3 class="mono" style="margin:0 0 8px">Important</h3><p class="sub">En cas d’intempéries ou sur demande des autorités, un parcours de repli pourra être proposé.</p></div>`},
 ravitos(){return `<div class="card" style="--accent:var(--lst)"><h2 class="section-title mono">Ravitaillements & assistance</h2><div class="grid two-desktop">${DATA.map(c=>`<div class="course-card" style="--accent:${c.color}"><h3>${c.short}</h3><p class="sub">${c.ravito}</p></div>`).join('')}</div><div class="notice danger" style="margin-top:12px"><b>Assistance extérieure :</b> interdite sur le parcours et sur les aires de ravitaillement, sauf zone d’assistance de la Petite Commune. Exception : assistance ponctuelle tolérée sur les ravitaillements du 75 km non chronométré du Supr’AMT.</div><div class="notice" style="margin-top:10px"><b>Sacs :</b> sac coureur possible avant départ, dépôt jusqu’à 1h avant la course, récupération à l’arrivée jusqu’à 30 min après le dernier coureur. AMT : 1 sac à la Petite Commune. Supr’AMT : 2 sacs dont Petite Commune. Bâtons interdits dans les sacs d’allègement.</div></div>`},
 materiel(){return `<div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Matériel obligatoire & conseillé</h2><p class="sub">Contrôles possibles avant, pendant et après course. Matériel obligatoire manquant = pénalité possible jusqu’à disqualification.</p><div class="grid two-desktop">${Object.values(MATERIAL).map(m=>`<div class="matblock" style="--accent:${m.color}"><h3>${m.title}</h3><p class="sub"><b>Obligatoire</b></p><div class="chips">${m.required.map(x=>`<span class="chip req">${x}</span>`).join('')}</div><p class="sub" style="margin-top:12px"><b>Conseillé</b></p><div class="chips">${m.recommended.map(x=>`<span class="chip rec">${x}</span>`).join('')}</div></div>`).join('')}</div></div>`},
 securite(){return `<div class="card" style="--accent:var(--amt)"><h2 class="section-title mono">Sécurité & abandon</h2><div class="grid two-desktop"><div class="notice danger"><b>Urgence :</b> téléphone allumé et en état de fonctionnement pendant toute la course. En cas d’urgence vitale, appeler les secours puis prévenir l’organisation dès que possible.</div><div class="notice danger"><b>PC course / abandon :</b><br><a class="map" href="tel:+33632261566" style="margin-top:8px">Appeler le +33 6 32 26 15 66</a><p class="sub" style="margin:.7rem 0 0">Numéro à utiliser pour déclarer un abandon auprès du PC course. Depuis l’étranger, composer le +33 6 32 26 15 66.</p></div><div class="notice"><b>Assistance à coureur :</b> chaque participant doit porter assistance à toute personne en difficulté et prévenir les secours / l’organisation.</div><div class="notice"><b>Voie publique :</b> respect du Code de la route, trottoirs obligatoires et passages piétons pour traverser.</div><div class="notice danger"><b>Procédure abandon :</b> signaler l’abandon au responsable du ravitaillement le plus proche puis contacter le PC course au +33 6 32 26 15 66. Le coureur rejoint le ravito par ses propres moyens ; navette régulière sur les ravitaillements.</div><div class="notice"><b>Avant départ :</b> enregistrer le numéro PC course dans son téléphone et vérifier batterie + mode économie d’énergie.</div></div></div>`},
 gpx(){return `<div class="card" style="--accent:var(--yellow)"><h2 class="section-title mono">Traces GPX</h2><p class="sub">Les traces GPX officielles seront disponibles ici le <b>15 juin</b>.</p><div class="notice danger"><b>Important :</b> utilisez uniquement les traces officielles 2026 mises à disposition dans ce briefing. Ne pas utiliser d’anciennes traces.</div><div class="course-card" style="--accent:var(--amt);margin-top:12px"><h3 class="mono" style="margin:0 0 8px">Suivi balise</h3><p class="sub">Le lien de suivi des balises sera disponible ici le <b>15 juin</b>.</p><a class="gpx-download disabled" href="#" aria-disabled="true">Suivi balise disponible le 15 juin</a></div><div class="grid two-desktop" style="margin-top:12px">${DATA.map(c=>{const url=GPX_LINKS[c.id]; return `<div class="course-card" style="--accent:${c.color}"><h3>${c.short}</h3><p class="sub">Trace officielle de la course — disponible le 15 juin.</p><a class="gpx-download disabled" data-gpx-link data-label="${c.short}" href="${url}" download aria-disabled="true">Vérification du fichier…</a></div>`}).join('')}</div></div>`} , partenaires(){return `<div class="card" style="--accent:var(--orange)"><h2 class="section-title mono">Partenaires</h2><p class="sub">Retrouvez les partenaires qui soutiennent l’Ardennes Méga Trail sur le site officiel.</p><a class="map" target="_blank" rel="noopener" href="https://www.ardennes-megatrail.com/#partenaires" style="margin-top:12px">Ils nous soutiennent, découvrez-les</a><div class="notice" style="margin-top:14px"><b>À savoir :</b> le lien ouvre la section partenaires du site officiel. Si la page ne descend pas automatiquement sur certains téléphones, il suffit d’aller dans le menu du site puis “Partenaires”.</div></div>`},
